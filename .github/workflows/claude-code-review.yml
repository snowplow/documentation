name: Claude Code Review

on:
  pull_request:
    types: [opened]

jobs:
  claude-review:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a documentation PR for writing quality and style guide compliance.

            Before reviewing, read both of these files in full:
            - `CLAUDE.md` — repo conventions (frontmatter, terminology, file structure, links, MDX components).
            - `src/pages/style-guide/llm/index.md` — full prose style guide.

            Then fetch the PR diff with `gh pr diff`.

            Scope: writing quality, style, terminology, structure, frontmatter, links, and use of repo-specific MDX components. Do not comment on technical correctness, architecture, or anything outside the diff. If CLAUDE.md and the style guide conflict, CLAUDE.md wins.

            For each issue you find:
            1. Quote the problematic text.
            2. State the rule it violates (cite CLAUDE.md or the style guide).
            3. Suggest a specific fix.

            Only flag meaningful violations — don't nitpick prose that's already fine, and don't repeat the same point on every line where it occurs (call it out once with one example, and say it applies elsewhere).

            If the PR is well-written and you find nothing material to flag, say so in one sentence rather than inventing issues.

            Post your review as a single PR comment using `gh pr comment` with your Bash tool.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
